<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Entorno VR Nano</title>
    <!-- Tailwind CSS (CDN para no requerir instalación extra) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .tab-active { border-bottom: 2px solid #3b82f6; color: #3b82f6; font-weight: 600; }
        .tab-inactive { color: #6b7280; }
        .tab-inactive:hover { color: #374151; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 antialiased min-h-screen">

    <!-- Navbar -->
    <nav class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <div class="flex-shrink-0 flex items-center">
                        <i class="fa-solid fa-vr-cardboard text-blue-600 text-3xl mr-3"></i>
                        <span class="font-bold text-xl tracking-tight text-gray-900">Entorno VR Nano</span>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Header -->
    <header class="bg-white shadow pt-8 pb-4">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">Panel de Control del Museo</h1>
            <p class="text-gray-500">Añade y gestiona el contenido dinámico del simulador.</p>
        </div>
        
        <!-- Tabs -->
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-6">
            <nav class="flex space-x-8" aria-label="Tabs">
                <a href="#scientists" id="tab-scientists" class="tab-active py-4 px-1 text-sm font-medium" onclick="switchTab('scientists')">
                    Hologramas Científicos
                </a>
                <a href="#nanotopics" id="tab-nanotopics" class="tab-inactive py-4 px-1 text-sm font-medium" onclick="switchTab('nanotopics')">
                    Paneles Nano
                </a>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Formulario (Reutilizable para ambas tablas) -->
        <div class="bg-white shadow rounded-lg mb-8 p-6 border border-gray-100">
            <h2 id="form-title" class="text-xl font-semibold mb-4 text-gray-800">Añadir Nuevo Holograma</h2>
            <form id="data-form" class="space-y-4">
                <input type="hidden" id="item-id">
                
                <div class="grid grid-cols-1 gap-y-6 gap-x-4 sm:grid-cols-2">
                    <div class="sm:col-span-1">
                        <label for="title" id="label-title" class="block text-sm font-medium text-gray-700">Nombre del Científico</label>
                        <div class="mt-1">
                            <input type="text" name="title" id="title" required class="shadow-sm focus:ring-blue-500 focus:border-blue-500 block w-full sm:text-sm border-gray-300 rounded-md p-2 border">
                        </div>
                    </div>

                    <div class="sm:col-span-1">
                        <label for="media_url" id="label-media" class="block text-sm font-medium text-gray-700">Nombre del Archivo (ej. foto.png)</label>
                        <div class="mt-1">
                            <input type="text" name="media_url" id="media_url" class="shadow-sm focus:ring-blue-500 focus:border-blue-500 block w-full sm:text-sm border-gray-300 rounded-md p-2 border">
                        </div>
                    </div>

                    <div class="sm:col-span-2">
                        <label for="description" class="block text-sm font-medium text-gray-700">Descripción / Contenido (Lo que dirá el audio/texto)</label>
                        <div class="mt-1">
                            <textarea id="description" name="description" rows="3" required class="shadow-sm focus:ring-blue-500 focus:border-blue-500 block w-full sm:text-sm border-gray-300 rounded-md p-2 border"></textarea>
                        </div>
                    </div>
                </div>

                <div class="flex justify-end space-x-3 mt-4">
                    <button type="button" onclick="resetForm()" class="bg-white py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                        Limpiar
                    </button>
                    <button type="submit" class="bg-blue-600 border border-transparent rounded-md shadow-sm py-2 px-4 inline-flex justify-center text-sm font-medium text-white hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                        Guardar Cambios
                    </button>
                </div>
            </form>
        </div>

        <!-- Tabla de Datos -->
        <div class="bg-white shadow rounded-lg border border-gray-100 overflow-hidden">
            <div class="px-4 py-5 border-b border-gray-200 sm:px-6 flex justify-between items-center">
                <h3 id="table-title" class="text-lg leading-6 font-medium text-gray-900">Listado de Científicos Activos</h3>
                <button onclick="fetchData()" class="text-sm text-blue-600 hover:text-blue-800"><i class="fa-solid fa-rotate-right mr-1"></i>Refrescar</button>
            </div>
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
                            <th scope="col" id="col-title" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nombre</th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Contenido</th>
                            <th scope="col" id="col-media" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Media</th>
                            <th scope="col" class="relative px-6 py-3"><span class="sr-only">Acciones</span></th>
                        </tr>
                    </thead>
                    <tbody id="data-table-body" class="bg-white divide-y divide-gray-200">
                        <!-- Las filas se insertarán desde app.js -->
                        <tr><td colspan="5" class="px-6 py-4 text-center text-sm text-gray-500">Cargando datos del servidor...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="app.js"></script>
</body>
</html>
